services:
  prometheus:
    image: prom/prometheus
    container_name: ai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
  grafana:
    image: grafana/grafana-oss
    container_name: ai-grafana
    ports:
     - "3000:3000"
    depends_on:
      - prometheus
  flask:
    build: .
    container_name: ai-flask
    ports:
      - "5001:5001"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
